<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Knew You — A Family-Centered Beauty &amp; Restoration Movement in Highlands Ranch, Colorado."/>
  <title>Knew You — A Family-Centered Beauty &amp; Restoration Movement</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!--
  ════════════════════════════════════════════
    STYLESHEETS — one file per section.
    To edit styles for a section: open that CSS file.
    Global tokens, reset, buttons, animations → base.css
  ════════════════════════════════════════════ -->
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/nav.css"/>
  <link rel="stylesheet" href="css/hero.css"/>
  <link rel="stylesheet" href="css/why.css"/>
  <link rel="stylesheet" href="css/building.css"/>
  <link rel="stylesheet" href="css/pillars.css"/>
  <link rel="stylesheet" href="css/foundation.css"/>
  <link rel="stylesheet" href="css/coming-soon.css"/>
  <link rel="stylesheet" href="css/founder.css"/>
  <link rel="stylesheet" href="css/testimonials.css"/>
  <link rel="stylesheet" href="css/services.css"/>
  <link rel="stylesheet" href="css/connect.css"/>
  <link rel="stylesheet" href="css/footer.css"/>
</head>
<body>

  <!--
  ════════════════════════════════════════════
    HOW THIS SITE IS ORGANIZED
    ────────────────────────────────────────
    Each section of the page lives in its own file:

    sections/01-nav.html          Navigation bar
    sections/02-hero.html         Hero banner
    sections/03-why.html          Why This Matters
    sections/04-building.html     What We're Building
    sections/05-pillars.html      Three Core Pillars
    sections/06-foundation.html   Mission / Vision / Values
    sections/07-coming-soon.html  Coming Soon block
    sections/08-founder.html      Meet the Founder
    sections/09-testimonials.html Testimonials
    sections/10-services.html     Work With Us
    sections/11-connect.html      Contact form
    sections/12-footer.html       Footer

    Each section's styles live in css/<name>.css
    Shared styles (colors, fonts, buttons) → css/base.css

    To reorder sections: move the data-section lines below.
    To hide a section:   comment it out with <!-- ... →
    ────────────────────────────────────────
    NOTE: Requires a local web server to load sections.
    Quickest way: VS Code → Live Server extension
    Or: python3 -m http.server 8000
  ════════════════════════════════════════════
  -->

  <!-- Global overlays -->
  <div id="grain"        aria-hidden="true"></div>
  <div id="progress-bar" aria-hidden="true" role="progressbar" aria-valuemin="0" aria-valuemax="100"></div>

  <!-- Section slots — JS below loads each file into these divs -->
  <div data-section="sections/01-nav.html"></div>
  <div data-section="sections/02-hero.html"></div>
  <div data-section="sections/03-why.html"></div>
  <div data-section="sections/04-building.html"></div>
  <div data-section="sections/05-pillars.html"></div>
  <div data-section="sections/06-foundation.html"></div>
  <div data-section="sections/07-coming-soon.html"></div>
  <div data-section="sections/08-founder.html"></div>
  <div data-section="sections/09-testimonials.html"></div>
  <div data-section="sections/10-services.html"></div>
  <div data-section="sections/11-connect.html"></div>
  <div data-section="sections/12-footer.html"></div>


  <!-- ════════════════════════════════════════
       JAVASCRIPT — all interactions live here.
       Sections: loader · scroll progress · nav ·
                 hamburger · hero parallax ·
                 scroll reveal · card tilt ·
                 back-to-top
  ════════════════════════════════════════ -->
  <script>
  /* ── 1. Section Loader ─────────────────────────────────
     Fetches each section HTML file and replaces its
     placeholder <div> with the actual markup.
     After all sections load, runs initPage().
  ──────────────────────────────────────────────────── */
  (async function loadSections() {
    const slots = [...document.querySelectorAll('[data-section]')];
    await Promise.all(slots.map(async slot => {
      const path = slot.getAttribute('data-section');
      try {
        const res  = await fetch(path);
        if (!res.ok) throw new Error(`Failed: ${path}`);
        const html = await res.text();
        const frag = document.createRange().createContextualFragment(html);
        slot.replaceWith(frag);
      } catch (e) {
        console.warn(e.message);
        slot.remove();
      }
    }));
    initPage();
  })();


  /* ── 2. Main init — runs after all sections are loaded ─ */
  function initPage() {

    /* ── Scroll Progress Bar ─────────────────────────── */
    const bar = document.getElementById('progress-bar');
    if (bar) {
      const updateBar = () => {
        const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
        bar.style.width = Math.min(pct, 100) + '%';
        bar.setAttribute('aria-valuenow', Math.round(pct));
      };
      window.addEventListener('scroll', updateBar, { passive: true });
    }


    /* ── Sticky Nav ──────────────────────────────────── */
    const nav = document.getElementById('nav');
    if (nav) {
      const updateNav = () => {
        nav.classList.toggle('scrolled', window.scrollY > 60);
      };
      window.addEventListener('scroll', updateNav, { passive: true });
      updateNav(); // run once on load
    }


    /* ── Active section highlight (IntersectionObserver) */
    const sections  = document.querySelectorAll('section[id]');
    const navLinks  = document.querySelectorAll('.nav-link');
    if (sections.length && navLinks.length) {
      const sectionObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            navLinks.forEach(link => {
              link.classList.toggle('active', link.getAttribute('href') === `#${id}`);
            });
          }
        });
      }, { threshold: 0.35 });
      sections.forEach(s => sectionObserver.observe(s));
    }


    /* ── Hamburger / Mobile Menu ─────────────────────── */
    const burger = document.getElementById('hamburger');
    const mMenu  = document.getElementById('mobile-menu');
    if (burger && mMenu) {
      const toggleMenu = (open) => {
        burger.classList.toggle('open', open);
        mMenu.classList.toggle('open', open);
        burger.setAttribute('aria-expanded', String(open));
        mMenu.setAttribute('aria-hidden', String(!open));
        document.body.style.overflow = open ? 'hidden' : '';
      };
      burger.addEventListener('click', () => toggleMenu(!burger.classList.contains('open')));
      mMenu.querySelectorAll('a').forEach(a =>
        a.addEventListener('click', () => toggleMenu(false))
      );
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && mMenu.classList.contains('open')) toggleMenu(false);
      });
      // Close if user taps outside nav links area (on the dim bg)
      mMenu.addEventListener('click', e => {
        if (e.target === mMenu) toggleMenu(false);
      });
    }


    /* ── Hero Parallax ───────────────────────────────── */
    const heroBg = document.getElementById('hero-bg');
    if (heroBg) {
      const heroH = window.innerHeight;
      const updateParallax = () => {
        if (window.scrollY < heroH) {
          heroBg.style.transform = `translateY(${window.scrollY * 0.28}px)`;
        }
      };
      window.addEventListener('scroll', updateParallax, { passive: true });
    }


    /* ── Scroll Reveal (IntersectionObserver) ────────── */
    const revealEls = document.querySelectorAll(
      '.reveal, .reveal-left, .reveal-right, .stagger'
    );
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

    revealEls.forEach(el => observer.observe(el));


    /* ── Card Tilt (pillar cards + testimonial cards) ── */
    document.querySelectorAll('.pillar-card, .tcard').forEach(card => {
      card.addEventListener('mousemove', e => {
        const r  = card.getBoundingClientRect();
        const x  = ((e.clientX - r.left) / r.width  - 0.5) * 12;
        const y  = ((e.clientY - r.top)  / r.height - 0.5) * -12;
        card.style.transform = `translateY(-8px) rotateX(${y}deg) rotateY(${x}deg)`;
      });
      card.addEventListener('mouseleave', () => {
        card.style.transform = '';
      });
    });


    /* ── Grain noise re-randomise ───────────────────── */
    const grain = document.getElementById('grain');
    if (grain) {
      setInterval(() => {
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        grain.style.backgroundPosition = `${x}% ${y}%`;
      }, 80);
    }


    /* ── Back to Top ────────────────────────────────── */
    const backBtn = document.getElementById('back-to-top');
    if (backBtn) {
      backBtn.addEventListener('click', () =>
        window.scrollTo({ top: 0, behavior: 'smooth' })
      );
    }


    /* ── Smooth-scroll all in-page anchor links ──────── */
    document.querySelectorAll('a[href^="#"]').forEach(link => {
      link.addEventListener('click', e => {
        const target = document.querySelector(link.getAttribute('href'));
        if (target) {
          e.preventDefault();
          const offset = 80; // accounts for fixed nav height
          const top = target.getBoundingClientRect().top + window.scrollY - offset;
          window.scrollTo({ top, behavior: 'smooth' });
        }
      });
    });

  } // end initPage
  </script>

</body>
</html>
