    <!-- ════════════════════════════════════════
       JAVASCRIPT — unchanged from original
  ════════════════════════════════════════ -->
    <script>
      /* ── 1. Section Loader ───────────────────────────────── */
      (async function loadSections() {
        const slots = [...document.querySelectorAll("[data-section]")];
        await Promise.all(
          slots.map(async (slot) => {
            const path = slot.getAttribute("data-section");
            try {
              const res = await fetch(path);
              if (!res.ok) throw new Error(`Failed: ${path}`);
              const html = await res.text();
              const frag = document
                .createRange()
                .createContextualFragment(html);
              slot.replaceWith(frag);
            } catch (e) {
              console.warn(e.message);
              slot.remove();
            }
          }),
        );
        initPage();
      })();

      /* ── 2. Main init ──────────────────────────────────── */
      function initPage() {
        /* Scroll Progress Bar */
        const bar = document.getElementById("progress-bar");
        if (bar) {
          const updateBar = () => {
            const pct =
              (window.scrollY /
                (document.body.scrollHeight - window.innerHeight)) *
              100;
            bar.style.width = Math.min(pct, 100) + "%";
            bar.setAttribute("aria-valuenow", Math.round(pct));
          };
          window.addEventListener("scroll", updateBar, { passive: true });
        }

        /* Sticky Nav */
        const nav = document.getElementById("nav");
        if (nav) {
          const updateNav = () => {
            nav.classList.toggle("scrolled", window.scrollY > 60);
          };
          window.addEventListener("scroll", updateNav, { passive: true });
          updateNav();
        }

        /* Active section highlight */
        const sections = document.querySelectorAll("section[id]");
        const navLinks = document.querySelectorAll(".nav-link");
        if (sections.length && navLinks.length) {
          const sectionObserver = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) {
                  const id = entry.target.id;
                  navLinks.forEach((link) => {
                    link.classList.toggle(
                      "active",
                      link.getAttribute("href") === `#${id}`,
                    );
                  });
                }
              });
            },
            { threshold: 0.35 },
          );
          sections.forEach((s) => sectionObserver.observe(s));
        }

        /* Hamburger / Mobile Menu */
        const burger = document.getElementById("hamburger");
        const mMenu = document.getElementById("mobile-menu");
        if (burger && mMenu) {
          const toggleMenu = (open) => {
            burger.classList.toggle("open", open);
            mMenu.classList.toggle("open", open);
            burger.setAttribute("aria-expanded", String(open));
            mMenu.setAttribute("aria-hidden", String(!open));
            document.body.style.overflow = open ? "hidden" : "";
          };
          burger.addEventListener("click", () =>
            toggleMenu(!burger.classList.contains("open")),
          );
          mMenu
            .querySelectorAll("a")
            .forEach((a) =>
              a.addEventListener("click", () => toggleMenu(false)),
            );
          document.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && mMenu.classList.contains("open"))
              toggleMenu(false);
          });
          mMenu.addEventListener("click", (e) => {
            if (e.target === mMenu) toggleMenu(false);
          });
        }

        /* Hero Parallax */
        const heroBg = document.getElementById("hero-bg");
        if (heroBg) {
          const heroH = window.innerHeight;
          const updateParallax = () => {
            if (window.scrollY < heroH) {
              heroBg.style.transform = `translateY(${window.scrollY * 0.28}px)`;
            }
          };
          window.addEventListener("scroll", updateParallax, { passive: true });
        }

        /* Scroll Reveal */
        const revealEls = document.querySelectorAll(
          ".reveal, .reveal-left, .reveal-right, .stagger",
        );
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("visible");
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.1, rootMargin: "0px 0px -40px 0px" },
        );
        revealEls.forEach((el) => observer.observe(el));

        /* Card Tilt */
        document.querySelectorAll(".pillar-card, .tcard").forEach((card) => {
          card.addEventListener("mousemove", (e) => {
            const r = card.getBoundingClientRect();
            const x = ((e.clientX - r.left) / r.width - 0.5) * 12;
            const y = ((e.clientY - r.top) / r.height - 0.5) * -12;
            card.style.transform = `translateY(-8px) rotateX(${y}deg) rotateY(${x}deg)`;
          });
          card.addEventListener("mouseleave", () => {
            card.style.transform = "";
          });
        });

        /* Grain noise */
        const grain = document.getElementById("grain");
        if (grain) {
          setInterval(() => {
            grain.style.backgroundPosition = `${Math.random() * 100}% ${Math.random() * 100}%`;
          }, 80);
        }

        /* Back to Top */
        const backBtn = document.getElementById("back-to-top");
        if (backBtn) {
          backBtn.addEventListener("click", () =>
            window.scrollTo({ top: 0, behavior: "smooth" }),
          );
        }

        /* Smooth scroll */
        document.querySelectorAll('a[href^="#"]').forEach((link) => {
          link.addEventListener("click", (e) => {
            const target = document.querySelector(link.getAttribute("href"));
            if (target) {
              e.preventDefault();
              const top =
                target.getBoundingClientRect().top + window.scrollY - 80;
              window.scrollTo({ top, behavior: "smooth" });
            }
          });
        });
      } // end initPage
    </script>
